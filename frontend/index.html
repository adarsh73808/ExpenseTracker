<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Expense Tracker</h1>
        
        <div class="balance-section">
            <div class="balance-card">
                <h3>Total Balance</h3>
                <div class="amount" id="totalBalance">₹0.00</div>
            </div>
            <div class="balance-card income">
                <h3>Total Income</h3>
                <div class="amount" id="totalIncome">₹0.00</div>
            </div>
            <div class="balance-card expense">
                <h3>Total Expenses</h3>
                <div class="amount" id="totalExpenses">₹0.00</div>
            </div>
        </div>

        <div class="form-section">
            <h2>Add New Transaction</h2>
            <form id="expenseForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" required placeholder="Enter description">
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" step="0.01" required placeholder="Enter amount">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select Category</option>
                            <option value="Food">Food</option>
                            <option value="Transportation">Transportation</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Income">Income</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="type">Type</label>
                        <select id="type" required>
                            <option value="">Select Type</option>
                            <option value="income">Income</option>
                            <option value="expense">Expense</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn">Add Transaction</button>
            </form>
        </div>

        <div class="expenses-list">
            <h2>Recent Transactions</h2>
            <div id="expensesList">
                <div class="no-expenses">No transactions yet. Add your first transaction above!</div>
            </div>
        </div>
    </div>

 <script src="script.js"> </script>
</body>
</html>
